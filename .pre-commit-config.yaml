# Pre-commit hooks configuration
# Install: pip install pre-commit
# Setup: pre-commit install
# Run manually: pre-commit run --all-files

# NOTE: Using venv Python explicitly for local hooks

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: .venv/Scripts/python.exe -m ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: .venv/Scripts/python.exe -m ruff format
        language: system
        types: [python]
