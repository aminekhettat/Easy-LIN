[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [
    ".git",
    ".pytest_cache",
    ".ruff_cache",
    ".venv",
    "docs/_build",
    "LDF",
]

[tool.ruff.lint]
select = ["E", "F", "B"]
ignore = ["E501"]

[tool.pylint."messages control"]
disable = [
    "missing-function-docstring",
    "missing-class-docstring",
    "redefined-outer-name",
    "unused-argument",
    "wrong-import-position",
    "useless-return",
    "too-few-public-methods",
    "unused-import",
    "unused-variable",
]

[tool.pylint.format]
max-line-length = 100
